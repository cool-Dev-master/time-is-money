<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Is Money - The True Cost</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>
    
    <div class="container">
        <!-- Screen 1: Setup -->
        <div id="setup-screen" class="screen active">
            <div class="header">
                <h1>Time Is Money</h1>
                <p>Stop seeing prices as just numbers on a tag.<br>Translate your expenses into the actual hours of your life it takes to earn them.</p>
            </div>
            <form id="setup-form">
                <div class="input-group">
                    <label for="salary">Monthly Salary</label>
                    <div class="input-with-icon">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="salary" required min="1" placeholder="e.g. 15000" value="100">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="hours">Weekly Work Hours (Optional)</label>
                    <input type="number" id="hours" min="1" max="168" placeholder="Default: 40">
                </div>
                
                <div class="input-group">
                    <label for="currency">Currency</label>
                    <select id="currency">
                        <option value="₹">INR (₹)</option>
                        <option value="$">USD ($)</option>
                        <option value="€">EUR (€)</option>
                        <option value="£">GBP (£)</option>
                        <option value="¥">JPY (¥)</option>
                        <option value="A$">AUD (A$)</option>
                        <option value="C$">CAD (C$)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn primary-btn">Calculate My Worth</button>
            </form>
        </div>

        <!-- Screen 2: Expense Calculator -->
        <div id="expense-screen" class="screen">
            <div class="header">
                <h1>Time vs Expense</h1>
                <!-- <p>Your time is valued at <span id="hourly-rate-display" class="highlight"></span>/hour</p> -->
            </div>
            
            <form id="expense-form">
                <div class="input-group">
                    <label for="expense">How much is this expense?</label>
                    <div class="input-with-icon">
                        <span class="currency-symbol display-currency">$</span>
                        <input type="number" id="expense" required min="0.01" step="0.01" placeholder="e.g. 1000">
                    </div>
                </div>
                <button type="submit" class="btn primary-btn">Calculate Time Cost</button>
            </form>

            <div id="result-container" class="result-container hidden">
                <h3>This will cost you:</h3>
                <div class="time-breakdown" id="time-breakdown">
                    <!-- Dynamic breakdown items here -->
                </div>
                
                <div class="earnings-breakdown hidden" id="earnings-breakdown">
                    <h4>Your Earnings Breakdown</h4>
                    <div class="earnings-grid" id="earnings-grid">
                        <div class="earning-stat">
                            <span class="earning-val" id="earn-month"></span>
                            <span class="earning-label">Per Month</span>
                        </div>
                        <div class="earning-stat">
                            <span class="earning-val" id="earn-day"></span>
                            <span class="earning-label">Per Day</span>
                        </div>
                        <div class="earning-stat">
                            <span class="earning-val" id="earn-hour"></span>
                            <span class="earning-label">Per Hour</span>
                        </div>
                        <div class="earning-stat">
                            <span class="earning-val" id="earn-minute"></span>
                            <span class="earning-label">Per Minute</span>
                        </div>
                    </div>
                </div>
            </div>

            <button type="button" id="reset-btn" class="btn text-btn">Reset My Information</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
